service: studysphere-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 512
  timeout: 30
  stage: ${opt:stage, 'prod'}

  environment:
    NODE_ENV: ${self:provider.stage}
    SECRETS_ID: StudySphere/api/prod

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: arn:aws:secretsmanager:us-east-1:763112298918:secret:StudySphere/api/prod-FPorOO

  httpApi:
    cors:
      allowedOrigins:
        - https://main.ddgurp0ja266c.amplifyapp.com
        - http://localhost:5173
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          method: ANY
          path: /
      - httpApi:
          method: ANY
          path: /{proxy+}

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
    external:
      - '@aws-sdk/*'
      - '@supabase/*'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
    noPrependStageInUrl: true

package:
  individually: true
  patterns:
    - '!src/**'
    - '!**/*.ts'
    - '!.env*'
    - '!README*'
